# nginx snippet — add INSIDE your existing HTTPS server { } block (recovia / main site).
# Replace PUBLIC_PATH with the value from ~/db_reader/.fam/.public_path (e.g. /a1b2c3d4).
#
#   include /home/ubuntu/db_reader/.fam/deploy/nginx-hidden-path.conf;
#
# Or paste the location block below.

# limit_req_zone (once, in http {}) if not already present:
# limit_req_zone $binary_remote_addr zone=espanol_auth:10m rate=10r/m;

location PUBLIC_PATH/ {
    proxy_pass http://127.0.0.1:8010/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

location PUBLIC_PATH/api/auth/ {
    limit_req zone=espanol_auth burst=5 nodelay;
    proxy_pass http://127.0.0.1:8010/api/auth/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
